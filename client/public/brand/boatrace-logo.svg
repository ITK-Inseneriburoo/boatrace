<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -5 950 280" role="img" aria-labelledby="title desc">
  <title id="title">BOATRACE</title>
  <desc id="desc">Türkiissinise võidusõidupaadi ja lainetega BOATRACE logo</desc>
  <defs>
    <linearGradient id="hull" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8ffcf1"/>
      <stop offset="0.48" stop-color="#2ec4b6"/>
      <stop offset="1" stop-color="#087f8c"/>
    </linearGradient>
    <linearGradient id="wake" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#63e6ff" stop-opacity="0"/>
      <stop offset="0.45" stop-color="#63e6ff" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#b9fff8"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#087f8c" stop-opacity="0"/>
      <stop offset="0.25" stop-color="#16a6b6"/>
      <stop offset="0.7" stop-color="#2ec4b6"/>
      <stop offset="1" stop-color="#8ffcf1" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-25%" width="130%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#03131d" flood-opacity="0.78"/>
    </filter>
  </defs>

  <!-- Kiirusjooned ja kiiluvesi -->
  <g fill="none" stroke-linecap="round">
    <path d="M121 71H278" stroke="#66f5eb" stroke-width="7" opacity="0.86"/>
    <path d="M171 50H291" stroke="#b8fff9" stroke-width="4" opacity="0.72"/>
    <path d="M76 92H259" stroke="#2ec4b6" stroke-width="4" opacity="0.62"/>
    <path d="M151 105C241 92 307 95 379 108" stroke="url(#wake)" stroke-width="12"/>
    <path d="M227 115C309 99 388 105 467 119" stroke="#d9fffc" stroke-width="5" opacity="0.88"/>
  </g>

