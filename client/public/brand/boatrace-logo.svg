  <g filter="url(#shadow)">
    <path d="M281 79 328 75 359 42h83l39 33h139l-21 22c-15 16-37 24-65 24H351c-27 0-49-9-66-28l-12-13Z" fill="url(#hull)" stroke="#062b38" stroke-width="6" stroke-linejoin="round"/>
    <path d="M347 74 372 50h61l28 24Z" fill="#eafffd" stroke="#062b38" stroke-width="5" stroke-linejoin="round"/>
    <path d="M385 55h42l17 19h-76Z" fill="#176b7e"/>
