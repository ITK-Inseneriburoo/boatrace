<!doctype html>
<html lang="et">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#061019" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/boatrace-180.png" />
    <title>Boatrace — paadivõidusõit</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚤</text></svg>" />
    <style>
      html, body { margin: 0; height: 100%; background: #061019; }
      #boot-loader {
        position: fixed;
        inset: 0;
        z-index: 10000;
        display: grid;
        place-items: center;
        color: #eef3f6;
        background: radial-gradient(circle at 50% 35%, #12364a 0, #081923 42%, #040b10 100%);
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        opacity: 1;
        transition: opacity 0.4s ease;
      }
      #boot-loader.done { opacity: 0; pointer-events: none; }
      #boot-loader.failed .boot-bar::after { animation: none; background: #d7263d; transform: scaleX(1); }
      .boot-content { width: min(360px, calc(100vw - 48px)); text-align: center; }
      .boot-title { font-size: clamp(2rem, 9vw, 4rem); font-weight: 800; letter-spacing: 0.12em; }
      .boot-wave { margin: 2px 0 28px; color: #2ec4b6; font-size: 1.3rem; letter-spacing: 0.5em; }
      .boot-bar { height: 3px; overflow: hidden; border-radius: 2px; background: rgba(255,255,255,0.12); }
      .boot-bar::after {
        content: "";
        display: block;
        width: 100%;
        height: 100%;
        background: #2ec4b6;
        transform-origin: left;
        animation: boot-progress 1.35s ease-in-out infinite;
      }
      #boot-status { min-height: 1.4em; margin-top: 14px; color: #9fb0bc; font-size: 0.9rem; }
      @keyframes boot-progress {
        0% { transform: translateX(-100%) scaleX(0.35); }
        55% { transform: translateX(20%) scaleX(0.55); }
        100% { transform: translateX(110%) scaleX(0.25); }
      }
      @media (prefers-reduced-motion: reduce) {
        #boot-loader { transition: none; }
        .boot-bar::after { animation-duration: 3s; }
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="ui"></div>
    <div id="boot-loader" role="status" aria-live="polite">
      <div class="boot-content">
        <div class="boot-title">BOATRACE</div>
        <div class="boot-wave" aria-hidden="true">≈ ≈ ≈</div>
        <div class="boot-bar" aria-hidden="true"></div>
        <div id="boot-status"></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
